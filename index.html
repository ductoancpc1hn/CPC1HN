<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RDCPC1HN</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    .login-page {--bg:#f4fbf6;--card:#fff;--line:#d9e9dd;--text:#163126;--muted:#5b7165;--brand:#15803d;--brand2:#16a34a;--soft:#dcfce7;--danger:#b91c1c;--shadow:0 20px 60px rgba(21,128,61,.10);--radius:22px}
    .login-page *{box-sizing:border-box} 
    body.login-page, .login-page {margin:0;font-family:'Roboto',system-ui,Arial,sans-serif;background:radial-gradient(circle at top left,rgba(22,163,74,.10),transparent 28%),radial-gradient(circle at bottom right,rgba(34,197,94,.10),transparent 24%),var(--bg);color:var(--text);min-height:100vh}
    .login-page .shell{max-width:1180px;margin:0 auto;padding:24px}
    .login-page .hero{display:grid;grid-template-columns:1.2fr .8fr;gap:24px;align-items:stretch;min-height:calc(100vh - 48px)}
    .login-page .card{background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.7);border-radius:var(--radius);box-shadow:var(--shadow)}
    .login-page .left{padding:42px}.login-page .right{padding:34px;align-self:center}
    .login-page .eyebrow{display:inline-flex;padding:10px 16px;border-radius:999px;background:var(--soft);color:var(--brand);border:1px solid #bbf7d0;font-weight:800;font-size:13px}
    .login-page h1{font-size:50px;line-height:1.05;margin:22px 0 18px}.login-page .lead{font-size:16px;line-height:1.8;color:var(--muted);max-width:720px}
    .login-page .mini{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:28px}.login-page .mini .box{padding:22px;border-radius:20px;background:#fff;box-shadow:0 18px 45px rgba(21,128,61,.08)}
    .login-page .k{font-size:13px;color:var(--muted);margin-bottom:8px}.login-page .v{font-size:20px;font-weight:900}
    .login-page .ttl{font-size:24px;font-weight:900;margin:0 0 8px}.login-page .sub{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:22px}
    .login-page .field{margin-bottom:16px} .login-page label{display:block;font-size:13px;font-weight:800;margin-bottom:8px;color:#2d4a3d}
    .login-page input{width:100%;padding:15px 16px;border:1px solid var(--line);border-radius:16px;font-size:15px;outline:none} .login-page input:focus{border-color:#86efac;box-shadow:0 0 0 4px rgba(34,197,94,.14)}
    .login-page button{width:100%;padding:16px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-size:16px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 14px 28px rgba(22,163,74,.24)}
    .login-page button[disabled]{opacity:.75;cursor:not-allowed}.login-page .spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:none}.login-page .loading .spinner{display:inline-block}
    .login-page .status{display:none;margin-top:14px;padding:14px;border-radius:14px;font-size:14px}.login-page .status.show{display:block}.login-page .status.ok{background:#ecfdf5;border:1px solid #bbf7d0;color:#166534}.login-page .status.err{background:#fef2f2;border:1px solid #fecaca;color:var(--danger)}
    .login-page .note{font-size:12px;color:var(--muted);margin-top:14px;text-align:center}@keyframes spin{to{transform:rotate(360deg)}}
    .login-page .slogan{
      margin-top: 90px;
      text-align: center;
      font-size: 28px;
      font-weight: 900;
      color: #dc2626;
      letter-spacing: .05em;
    }
    @media (max-width:980px){.login-page .hero{grid-template-columns:1fr}.login-page .mini{grid-template-columns:1fr}.login-page h1{font-size:48px}}
    .login-page .hero-head{
      display:flex;
      align-items:center;
      gap:18px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .login-page .hero-head-text{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .login-page .hero-logo{
      width:92px;
      height:92px;
      object-fit:contain;
      display:block;
      border-radius:18px;
      background:#ffffff;
      padding:8px;
      box-shadow:0 12px 28px rgba(21,128,61,.12);
    }
  </style>

      <div class="card right">
        <div class="ttl">Đăng nhập hệ thống</div>
        <div class="sub">Dùng số điện thoại hoặc email quản lý phòng RD cấp</div>
        <form id="loginForm">
          <div class="field"><label for="login">Số điện thoại hoặc email</label><input id="login" required placeholder="vd: admin@company.com hoặc 09xxxxxxxx" /></div>
          <div class="field"><label for="password">Mật khẩu</label><input id="password" type="password" required placeholder="Nhập mật khẩu" /></div>

    <script>
    // SUPABASE CLIENT INITIALIZATION
    const SUPABASE_URL = "https://bbzdpnpknkbfvpazlret.supabase.co";
    const SUPABASE_KEY = "sb_publishable_i0uBw2c50_Lp_Gh9ZXq6Lw_VIaIlev_";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const loginForm = document.getElementById('loginForm');
    if (loginForm) {
      const btn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const statusBox = document.getElementById('statusBox');
      
      function showStatus(type, message){ 
        statusBox.className = 'status show ' + type; 
        statusBox.textContent = message; 
      }

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        btn.disabled = true; 
        btn.classList.add('loading'); 
        btnText.textContent = 'Đang đăng nhập...';
        statusBox.className = 'status'; 
        statusBox.textContent = '';
        
        const loginVal = document.getElementById('login').value.trim().toLowerCase();
        const passwordVal = document.getElementById('password').value;

        try {
          const { data: users, error } = await supabaseClient.from('users').select('*');
          if (error) throw error;

          const matchedUser = users.find(u => {
            const email = String(u.email || '').trim().toLowerCase();
            const phone = String(u.phone || '').trim().toLowerCase();
            const rowPassword = String(u.password_hash || u['mật khẩu_mã băm'] || '').trim();
            const status = String(u.status || 'active').trim().toLowerCase();
            const isActive = (status === 'active' || status === 'đang hoạt động' || status === 'hoạt động');

            return (email === loginVal || phone === loginVal) && rowPassword === passwordVal && isActive;
          });

          if (!matchedUser) {
            throw new Error('Sai thông tin đăng nhập hoặc tài khoản bị khóa.');
          }

          const session = {
            user_id: String(matchedUser.user_id || '').trim(),
            full_name: String(matchedUser.full_name || '').trim(),
            role: String(matchedUser.role || 'staff').trim(),
            department: String(matchedUser.department || '').trim(),
            team: String(matchedUser.team || '').trim(),
            email: String(matchedUser.email || '').trim(),
            phone: String(matchedUser.phone || '').trim(),
            exp: Date.now() + 8 * 60 * 60 * 1000
          };

          localStorage.setItem('greenops_session', JSON.stringify(session));
          showStatus('ok', 'Đăng nhập thành công! Đang tải dashboard...');
          
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 600);

        } catch (err) {
          showStatus('err', err.message || 'Lỗi kết nối cơ sở dữ liệu.');
        } finally {
          btn.disabled = false; 
          btn.classList.remove('loading'); 
          btnText.textContent = 'Đăng nhập';
        }
      });
    }

    // Redirect to dashboard if session already exists and is valid
    window.addEventListener('DOMContentLoaded', () => {
      const stored = localStorage.getItem('greenops_session');
      if (stored) {
        try {
          const session = JSON.parse(stored);
          if (session.exp && Date.now() < session.exp) {
            window.location.href = 'dashboard.html';
          }
        } catch (e) {
          localStorage.removeItem('greenops_session');
        }
      }
    });
  </script>
</body>
</html>
